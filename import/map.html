<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map with Rectangular Selection and Export Data</title>
    <style>
        .map {
            display: block;
            margin: auto;
            width: 80%;
            height: auto;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        label, select {
            font-size: 1.2em;
        }

        .country {
            fill: #ccc;
            stroke: #333;
        }

        .selected {
            fill: orange;
        }
    </style>
</head>
<body>
    <svg class="map"></svg>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <script>
        const width = 960, height = 600;

        // Create SVG element
        const svg = d3.select(".map")
            .attr("width", width)
            .attr("height", height);

        // Create a projection and path generator
        const projection = d3.geoMercator().scale(150).translate([width / 2, height / 1.5]);
        const path = d3.geoPath().projection(projection);

        // Load and render the world map
        d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson").then(worldData => {
            const countries = worldData.features;

            const countryPaths = svg.selectAll("path")
                .data(countries)
                .enter().append("path")
                .attr("d", path)
                .attr("class", "country");

            // Create a brush
            const brush = d3.brush()
                .extent([[0, 0], [width, height]])
                .on("brush", brushed)
                .on("end", brushended);

            svg.append("g")
                .attr("class", "brush")
                .call(brush);

            function brushed(event) {
                const selection = event.selection;
                if (selection === null) return;

                const [[x0, y0], [x1, y1]] = selection;

                svg.selectAll("path")
                    .classed("selected", d => {
                        const [x, y] = path.centroid(d);
                        return x0 <= x && x <= x1 && y0 <= y && y <= y1;
                    });
            }

            function brushended(event) {
                if (!event.selection) {
                    svg.selectAll(".selected").classed("selected", false);
                }
            }

        });
    </script>
</body>
</html>
